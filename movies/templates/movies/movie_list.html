<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Movies</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(rgba(20,20,20,0.7), rgba(20,20,20,0.7)),
                        url("https://images.unsplash.com/photo-1524985069026-dd778a71c7b4");
            background-size: cover;
            background-attachment: fixed;
            color: #f5f5f5;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            color: #000;
            border-radius: 12px;
        }

        .title {
            text-align: center;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1 class="title">🎬 Lista de Películas</h1>

    <div class="row">
        {% for movie in movies %}
            <div class="col-md-4 mb-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h5 class="card-title">{{ movie.title }}</h5>
                        <p class="card-text">{{ movie.description }}</p>
                        <p class="text-muted">{{ movie.release_date }}</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <p>No hay películas disponibles</p>
        {% endfor %}
    </div>
</div>
{% if movie.image %}
    <img src="{{ movie.image.url }}" class="card-img-top" style="height: 250px; object-fit: cover;">
{% endif %}
</body>
</html>
